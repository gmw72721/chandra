substitutions:
  _REGION: us-central1
  _SERVICE: chandra-backend
  _REPOSITORY: chandra
  _SERVICE_ACCOUNT: chandra-backend@chandra-f6e13.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    id: pull-cache
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest || true

  - name: gcr.io/cloud-builders/docker
    id: build-image
    waitFor:
      - pull-cache
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - -f
      - backend/Dockerfile
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-revision-image
    waitFor:
      - build-image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    id: push-cache-image
    waitFor:
      - build-image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-cloud-run
    waitFor:
      - push-revision-image
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --project
      - ${PROJECT_ID}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}
      - --service-account
      - ${_SERVICE_ACCOUNT}
      - --port
      - "8000"
      - --no-allow-unauthenticated
      - --ingress
      - all
      - --timeout
      - 900s
      - --concurrency
      - "10"
      - --cpu
      - "1"
      - --memory
      - 2Gi
      - --min-instances
      - "0"
      - --max-instances
      - "5"
      - --update-env-vars
      - CHANDRA_ENV=production,FRONTEND_ORIGIN=https://chandra-frontend--chandra-f6e13.us-central1.hosted.app,NEXT_INTERNAL_BASE_URL=https://chandra-frontend--chandra-f6e13.us-central1.hosted.app,BACKEND_CORS_ORIGINS=https://chandra-frontend--chandra-f6e13.us-central1.hosted.app,OPENROUTER_BASE_URL=https://openrouter.ai/api/v1,OPENROUTER_HTTP_REFERER=https://chandra-frontend--chandra-f6e13.us-central1.hosted.app,OPENROUTER_APP_TITLE=Chandra,DEFAULT_MODEL=openai/gpt-5.4-mini,FIREBASE_PROJECT_ID=chandra-f6e13,FIREBASE_STORAGE_BUCKET=chandra-f6e13-tutor-knowledge,GCS_PDF_ASSETS_BUCKET=chandra-f6e13-pdf-page-assets,NEXT_PUBLIC_FIREBASE_PROJECT_ID=chandra-f6e13,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=chandra-f6e13.firebasestorage.app,GOOGLE_CLOUD_PROJECT=chandra-f6e13,GOOGLE_CLOUD_LOCATION=us,VERTEX_EMBEDDING_MODEL=gemini-embedding-2,VERTEX_EMBEDDING_DIMENSIONS=1536,BETTER_STACK_ENV=production
      - --update-secrets
      - OPENROUTER_API_KEY=chandra-backend-openrouter-api-key:latest,BACKEND_SHARED_SECRET=chandra-backend-backend-shared-secret:latest,NEXT_PUBLIC_FIREBASE_API_KEY=chandra-backend-next-public-firebase-api-key:latest,GEMINI_API_KEY=chandra-backend-gemini-api-key:latest,BETTER_STACK_SOURCE_TOKEN=chandra-backend-better-stack-source-token:latest,BETTER_STACK_INGESTING_HOST=chandra-backend-better-stack-ingesting-host:latest,BETTER_STACK_UPTIME_API_TOKEN=chandra-backend-better-stack-uptime-api-token:latest
