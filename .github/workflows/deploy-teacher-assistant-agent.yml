name: Deploy Teacher Assistant ADK Agent

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-teacher-assistant-agent.yml
      - agents/teacher_dashboard_agent/**
  workflow_dispatch:

concurrency:
  group: teacher-assistant-agent-deploy
  cancel-in-progress: false

jobs:
  deploy-teacher-assistant-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/teacher_dashboard_agent/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_AGENT_RUNTIME_DEPLOYER_KEY }}

      - name: Install ADK deploy dependencies
        run: python -m pip install -r agents/teacher_dashboard_agent/requirements.txt

      - name: Build runtime env file
        env:
          CHANDRA_ASSISTANT_TOOL_SHARED_SECRET: ${{ secrets.CHANDRA_ASSISTANT_TOOL_SHARED_SECRET }}
        run: |
          if [ -z "$CHANDRA_ASSISTANT_TOOL_SHARED_SECRET" ]; then
            echo "CHANDRA_ASSISTANT_TOOL_SHARED_SECRET secret is not set."
            exit 1
          fi

          {
            echo "GOOGLE_CLOUD_LOCATION=global"
            echo "GOOGLE_CLOUD_PROJECT=chandra-f6e13"
            echo "GOOGLE_GENAI_USE_VERTEXAI=True"
            echo "CHANDRA_ASSISTANT_TOOL_BASE_URL=https://chandra-frontend--chandra-f6e13.us-central1.hosted.app"
            printf 'CHANDRA_ASSISTANT_TOOL_SHARED_SECRET=%s\n' "$CHANDRA_ASSISTANT_TOOL_SHARED_SECRET"
            echo "TEACHER_ASSISTANT_MODEL=gemini-3-flash-preview"
          } > "$RUNNER_TEMP/teacher-dashboard-agent.env"

      - name: Redeploy Agent Engine
        working-directory: agents
        run: |
          python -m google.adk.cli deploy agent_engine \
            --project=chandra-f6e13 \
            --region=us-central1 \
            --agent_engine_id=3778903267166126080 \
            --display_name="ADK Teacher Dashboard Agent" \
            --env_file="$RUNNER_TEMP/teacher-dashboard-agent.env" \
            --requirements_file=teacher_dashboard_agent/requirements.txt \
            teacher_dashboard_agent
